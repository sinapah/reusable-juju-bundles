--- # overlay.yaml
applications:
  alertmanager:
    offers:
      alertmanager-karma-dashboard:
        endpoints:
        - karma-dashboard
        acl:
          admin: admin
  ca:
    offers:
      certificates:
        endpoints:
        - certificates
        acl:
          admin: admin
      send-ca-cert:
        endpoints:
        - send-ca-cert
        acl:
          admin: admin
  grafana:
    offers:
      grafana-dashboards:
        endpoints:
        - grafana-dashboard
        acl:
          admin: admin
  loki:
    offers:
      loki-logging:
        endpoints:
        - logging
        acl:
          admin: admin
  mimir:
    offers:
      mimir-receive-remote-write:
        endpoints:
        - receive-remote-write
        acl:
          admin: admin
  tempo:
    offers:
      tempo-tracing:
        endpoints:
        - tracing
        acl:
          admin: admin
