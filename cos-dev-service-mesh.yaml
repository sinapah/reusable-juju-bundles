bundle: kubernetes
applications:
  alertmanager:
    charm: alertmanager-k8s
    channel: dev/edge
    revision: 206
    resources:
      alertmanager-image: 102
    scale: 1
    constraints: arch=amd64
    storage:
      data: kubernetes,1,1024M
    trust: true
  ca:
    charm: self-signed-certificates
    channel: 1/edge
    revision: 637
    scale: 1
    constraints: arch=amd64
  catalogue:
    charm: catalogue-k8s
    channel: dev/edge
    revision: 126
    resources:
      catalogue-image: 37
    scale: 1
    constraints: arch=amd64
    trust: true
  grafana:
    charm: grafana-k8s
    channel: dev/edge
    revision: 187
    resources:
      grafana-image: 78
    scale: 1
    constraints: arch=amd64
    storage:
      database: kubernetes,1,1024M
    trust: true
  istio-ingress-k8s:
    charm: istio-ingress-k8s
    channel: dev/edge
    revision: 73
    resources:
      metrics-proxy-image: 3
    scale: 1
    constraints: arch=amd64
    trust: true
  istio-k8s:
    charm: istio-k8s
    channel: dev/edge
    revision: 49
    resources:
      metrics-proxy-image: 3
    scale: 1
    options:
      platform: ""
    constraints: arch=amd64
    trust: true
  loki:
    charm: loki-coordinator-k8s
    channel: dev/edge
    revision: 61
    resources:
      nginx-image: 7
      nginx-prometheus-exporter-image: 3
    scale: 1
    constraints: arch=amd64
    trust: true
  loki-worker:
    charm: loki-worker-k8s
    channel: dev/edge
    revision: 70
    resources:
      loki-image: 6
    scale: 1
    options:
      role-all: true
    constraints: arch=amd64
    storage:
      loki-persisted: kubernetes,1,1024M
    trust: true
  mimir:
    charm: mimir-coordinator-k8s
    channel: dev/edge
    revision: 82
    resources:
      nginx-image: 15
      nginx-prometheus-exporter-image: 4
    scale: 1
    constraints: arch=amd64
    trust: true
  mimir-worker:
    charm: mimir-worker-k8s
    channel: dev/edge
    revision: 71
    resources:
      mimir-image: 17
    scale: 1
    options:
      role-all: true
    constraints: arch=amd64
    storage:
      data: kubernetes,1,1024M
      recovery-data: kubernetes,1,1024M
    trust: true
  otelcol:
    charm: opentelemetry-collector-k8s
    channel: dev/edge
    revision: 179
    resources:
      opentelemetry-collector-image: 9
    scale: 1
    constraints: arch=amd64
    storage:
      persisted: kubernetes,1,1024M
    trust: true
  seaweedfs:
    charm: seaweedfs-k8s
    channel: latest/edge
    revision: 9
    resources:
      seaweedfs-image: 2
    scale: 1
    constraints: arch=amd64
    storage:
      data: kubernetes,1,1024M
    trust: true
  tempo:
    charm: tempo-coordinator-k8s
    channel: dev/edge
    revision: 149
    resources:
      nginx-image: 8
      nginx-prometheus-exporter-image: 4
    scale: 1
    constraints: arch=amd64
    trust: true
  tempo-worker:
    charm: tempo-worker-k8s
    channel: dev/edge
    revision: 103
    resources:
      tempo-image: 13
    scale: 1
    options:
      role-all: true
    constraints: arch=amd64
    storage:
      wal: kubernetes,1,1024M
    trust: true
  traefik:
    charm: traefik-k8s
    channel: latest/edge
    revision: 295
    base: ubuntu@20.04/stable
    resources:
      traefik-image: 162
    scale: 1
    constraints: arch=amd64
    storage:
      configurations: kubernetes,1,1024M
    trust: true
